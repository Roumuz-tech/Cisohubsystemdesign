<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:280px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;flex-direction:column;gap:10px">
  
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:8px;background:#3b82f614;border:1px solid #3b82f633">
      <div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;margin-top:7px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font:600 13px Inter;color:#1d4ed8">Heads up</div>
        <div style="font:400 13px/1.5 Inter;color:#3f3f46;margin-top:2px">New compliance framework available for review.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:8px;background:#22c55e14;border:1px solid #22c55e33">
      <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;margin-top:7px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font:600 13px Inter;color:#15803d">Saved</div>
        <div style="font:400 13px/1.5 Inter;color:#3f3f46;margin-top:2px">Risk assessment submitted for approval.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:8px;background:#f59e0b14;border:1px solid #f59e0b33">
      <div style="width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-top:7px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font:600 13px Inter;color:#b45309">Heads up</div>
        <div style="font:400 13px/1.5 Inter;color:#3f3f46;margin-top:2px">Token expires in 3 days. Refresh now.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:8px;background:#ef444414;border:1px solid #ef444433">
      <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;margin-top:7px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font:600 13px Inter;color:#b91c1c">Failed</div>
        <div style="font:400 13px/1.5 Inter;color:#3f3f46;margin-top:2px">Could not reach Active Directory. Retrying in 30s.</div>
      </div>
    </div>
</div>
</div></body></html>
