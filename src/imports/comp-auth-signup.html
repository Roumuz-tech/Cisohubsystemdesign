<!doctype html>
<!-- Source: §E.7 Sign-up -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:660px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
.src{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:10px;border-top:1px dashed var(--color-border);padding-top:6px;}
</style></head><body><div class="card">
<div style="background:var(--color-muted);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:580px">
  <div style="background:var(--color-card);border:1px solid var(--color-border);border-radius:12px;box-shadow:var(--shadow-xs);max-width:370px;width:100%">
    <div style="padding:40px">
      <div style="text-align:start;margin-bottom:22px">
        <div style="font:600 20px Inter;letter-spacing:-.01em">Create your account</div>
        <div style="font:400 14px Inter;color:var(--color-muted-foreground);margin-top:6px">14-day free trial of CISO Hub. No card required.</div>
      </div>

      <form style="display:flex;flex-direction:column;gap:14px">
        <input type="text" placeholder="Full name" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        <input type="email" placeholder="Work email" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        <input type="password" placeholder="Password" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        <input type="password" placeholder="Confirm password" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">

        <label style="display:flex;align-items:flex-start;gap:8px;font:400 13px/1.5 Inter;color:var(--color-muted-foreground);cursor:pointer;margin-top:4px">
          <input type="checkbox" style="accent-color:var(--color-primary);width:14px;height:14px;margin-top:3px;flex-shrink:0">
          <span>I agree to the <a style="color:var(--color-primary);text-decoration:none">Terms</a> and <a style="color:var(--color-primary);text-decoration:none">Privacy Policy</a></span>
        </label>

        <button type="submit" style="width:100%;height:34px;background:var(--color-primary);color:var(--color-primary-foreground);border:1px solid transparent;border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer">Create account</button>
      </form>

      <div style="text-align:center;margin-top:18px;font:400 14px Inter;color:var(--color-muted-foreground)">
        Already have an account? <a style="color:var(--color-primary);text-decoration:none;cursor:pointer">Sign in</a>
      </div>
    </div>
  </div>
</div>
<div class="src">Source: 03_Components_v1_1.md §E.7 Sign-up · same as Sign-in + name + confirm password + "لديك حساب؟" link</div></div></body></html>
