<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:200px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;gap:16px;align-items:flex-start">
  
    <div style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);padding:18px 20px;width:200px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font:500 13px Inter;color:#71717a">Active risks</div>
        <div style="width:32px;height:32px;border-radius:8px;background:#ef444414;display:flex;align-items:center;justify-content:center;color:#ef4444">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
        </div>
      </div>
      <div style="font:700 30px/1.1 Inter;margin-top:10px;letter-spacing:-0.02em">24</div>
      <div style="margin-top:6px"><span style="display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;border-radius:6px;background:rgba(239,68,68,.1);color:#b91c1c;font:500 11px Inter">+3 vs last 30d</span></div>
    </div>
    <div style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);padding:18px 20px;width:200px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font:500 13px Inter;color:#71717a">Frameworks linked</div>
        <div style="width:32px;height:32px;border-radius:8px;background:#3b82f614;display:flex;align-items:center;justify-content:center;color:#3b82f6">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
        </div>
      </div>
      <div style="font:700 30px/1.1 Inter;margin-top:10px;letter-spacing:-0.02em">12</div>
      <div style="margin-top:6px"><span style="display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;border-radius:6px;background:rgba(161,161,170,.15);color:#52525b;font:500 11px Inter">— vs last 30d</span></div>
    </div>
    <div style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);padding:18px 20px;width:200px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font:500 13px Inter;color:#71717a">Compliance score</div>
        <div style="width:32px;height:32px;border-radius:8px;background:#22c55e14;display:flex;align-items:center;justify-content:center;color:#22c55e">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
        </div>
      </div>
      <div style="font:700 30px/1.1 Inter;margin-top:10px;letter-spacing:-0.02em">86%</div>
      <div style="margin-top:6px"><span style="display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;border-radius:6px;background:rgba(34,197,94,.1);color:#15803d;font:500 11px Inter">+1.2% vs last 30d</span></div>
    </div>
</div>
</div></body></html>
