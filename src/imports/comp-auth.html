<!doctype html>
<!-- Source: §E.7 -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:620px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
.src{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:10px;border-top:1px dashed var(--color-border);padding-top:6px;}
</style></head><body><div class="card">
<div style="background:var(--color-muted);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:520px">

  <div style="background:var(--color-card);border:1px solid var(--color-border);border-radius:12px;box-shadow:var(--shadow-xs);max-width:370px;width:100%">
    <div style="padding:40px">
      <!-- F-118: title + description -->
      <div style="text-align:start;margin-bottom:22px">
        <div style="font:600 20px Inter;letter-spacing:-.01em">Sign in to CISO Hub</div>
        <div style="font:400 14px Inter;color:var(--color-muted-foreground);margin-top:6px">Welcome back. Continue to Comply.</div>
      </div>

      <!-- Social button -->
      <button style="width:100%;height:34px;background:var(--color-background);color:var(--color-foreground);border:1px solid var(--color-border);border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" opacity=".9"/></svg>
        Continue with Google
      </button>

      <!-- OR divider -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="flex:1;height:1px;background:var(--color-border)"></div>
        <div style="font:500 12px Inter;color:var(--color-muted-foreground)">OR</div>
        <div style="flex:1;height:1px;background:var(--color-border)"></div>
      </div>

      <!-- Form -->
      <form style="display:flex;flex-direction:column;gap:14px">
        <input type="email" placeholder="Email" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        <input type="password" placeholder="Password" style="height:34px;padding:0 12px;border:1px solid var(--color-border);border-radius:6px;font:400 13px Inter;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <label style="display:flex;align-items:center;gap:8px;font:400 14px Inter;cursor:pointer">
            <input type="checkbox" style="accent-color:var(--color-primary);width:14px;height:14px">
            <span>Remember me</span>
          </label>
          <a style="font:400 14px Inter;color:var(--color-primary);text-decoration:none;cursor:pointer">Forgot?</a>
        </div>
        <button type="submit" style="width:100%;height:34px;background:var(--color-primary);color:var(--color-primary-foreground);border:1px solid transparent;border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer">Sign In</button>
      </form>

      <div style="text-align:center;margin-top:18px;font:400 14px Inter;color:var(--color-muted-foreground)">
        New here? <a style="color:var(--color-primary);text-decoration:none;cursor:pointer">Create account</a>
      </div>
    </div>
  </div>

</div>
<div class="src">Source: 03_Components_v1_1.md §E.7 + F-118 · signin-page.tsx · max-w-[370px] p-10 · form gap-3.5 · Forgot? text-sm text-primary · Button w-full</div></div></body></html>
