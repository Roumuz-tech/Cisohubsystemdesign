<!doctype html>
<!-- Source: §F.12 -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:360px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
.src{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:10px;border-top:1px dashed var(--color-border);padding-top:6px;}
</style></head><body><div class="card">
<div style="display:flex;flex-direction:column;gap:10px">
  <div class="lbl">Mobile-style bottom drawer · darker overlay (black/80) vs Dialog (black/30)</div>
  <div style="position:relative;border:1px solid var(--color-border);border-radius:8px;height:280px;overflow:hidden">
    <!-- Backdrop / mobile context -->
    <div style="position:absolute;inset:0;background:var(--color-muted);padding:18px;font:500 13px Inter;color:var(--color-muted-foreground);opacity:.5">
      <div style="font:600 14px Inter">Mobile page behind drawer</div>
    </div>
    <!-- Overlay -->
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.80)"></div>
    <!-- Drawer content (bottom) -->
    <div style="position:absolute;inset-inline:0;bottom:0;background:var(--color-background);border-top-left-radius:10px;border-top-right-radius:10px;padding:0 18px 18px">
      <!-- Handle -->
      <div style="margin-block:16px 14px;width:100px;height:8px;border-radius:999px;background:var(--color-muted);margin-inline:auto"></div>
      <div style="font:600 15px Inter;margin-bottom:10px;text-align:center">Choose an action</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button style="height:36px;font:500 14px Inter;background:transparent;border:1px solid var(--color-border);border-radius:6px;color:var(--color-foreground);cursor:pointer">View risk details</button>
        <button style="height:36px;font:500 14px Inter;background:transparent;border:1px solid var(--color-border);border-radius:6px;color:var(--color-foreground);cursor:pointer">Mark as mitigated</button>
        <button style="height:36px;font:500 14px Inter;background:transparent;border:1px solid var(--color-border);border-radius:6px;color:var(--color-destructive);cursor:pointer">Delete risk</button>
      </div>
    </div>
  </div>
</div>
<div class="src">Source: 03_Components_v1_1.md §F.12 · drawer.tsx · Overlay bg-black/80 (⚠ darker than Dialog) · Handle h-2 w-[100px]</div></div></body></html>
