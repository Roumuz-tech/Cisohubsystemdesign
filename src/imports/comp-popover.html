<!doctype html>

<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:280px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
.src{font-size:10px;color:var(--color-muted-foreground);font-family:var(--font-mono);margin-top:10px;border-top:1px dashed var(--color-border);padding-top:6px;}
</style></head><body><div class="card">
<div style="display:flex;gap:40px;align-items:flex-start">
  <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-start">
    <button style="height:34px;padding:0 12px;background:var(--color-background);color:var(--color-foreground);border:1px solid var(--color-border);border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer">Open popover</button>
    <div class="lbl">trigger</div>
  </div>

  <div style="background:var(--color-popover);color:var(--color-popover-foreground);width:288px;border:1px solid var(--color-border);border-radius:6px;padding:16px;box-shadow:var(--shadow-md)">
    <div style="font:600 14px Inter;margin-bottom:4px">Filter risks</div>
    <div style="font:400 12px Inter;color:var(--color-muted-foreground);margin-bottom:12px">Choose severity to narrow results.</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label style="display:flex;align-items:center;gap:8px;font:400 13px Inter;cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--color-primary)"> Critical
      </label>
      <label style="display:flex;align-items:center;gap:8px;font:400 13px Inter;cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--color-primary)"> High
      </label>
      <label style="display:flex;align-items:center;gap:8px;font:400 13px Inter;cursor:pointer">
        <input type="checkbox" style="accent-color:var(--color-primary)"> Medium
      </label>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:14px;padding-top:10px;border-top:1px solid var(--color-border)">
      <button style="height:28px;padding:0 10px;font:500 12px Inter;background:transparent;border:1px solid var(--color-border);border-radius:6px;color:var(--color-foreground);cursor:pointer">Reset</button>
      <button style="height:28px;padding:0 10px;font:500 12px Inter;background:var(--color-primary);border:1px solid transparent;border-radius:6px;color:var(--color-primary-foreground);cursor:pointer">Apply</button>
    </div>
  </div>
</div>
