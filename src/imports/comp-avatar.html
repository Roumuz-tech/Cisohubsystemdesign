<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:200px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;gap:30px;align-items:flex-end">
  <div style="display:flex;align-items:flex-end;gap:14px">
    
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font:600 10px Inter">A</div>
        <div class="lbl">xs · 24</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font:600 13px Inter">A</div>
        <div class="lbl">sm · 32</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font:600 16px Inter">A</div>
        <div class="lbl">md · 40</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font:600 19px Inter">A</div>
        <div class="lbl">lg · 48</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;display:flex;align-items:center;justify-content:center;font:600 26px Inter">A</div>
        <div class="lbl">xl · 64</div>
      </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div class="lbl">Avatar group · stacked</div>
    <div style="display:flex;align-items:center">
      <div style="width:32px;height:32px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font:600 12px Inter;border:2px solid #fff;margin-left:0px">M</div><div style="width:32px;height:32px;border-radius:50%;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:center;font:600 12px Inter;border:2px solid #fff;margin-left:-10px">L</div><div style="width:32px;height:32px;border-radius:50%;background:#f59e0b;color:#fff;display:flex;align-items:center;justify-content:center;font:600 12px Inter;border:2px solid #fff;margin-left:-10px">K</div><div style="width:32px;height:32px;border-radius:50%;background:#ef4444;color:#fff;display:flex;align-items:center;justify-content:center;font:600 12px Inter;border:2px solid #fff;margin-left:-10px">N</div>
      <div style="width:32px;height:32px;border-radius:50%;background:#f4f4f5;color:#52525b;display:flex;align-items:center;justify-content:center;font:600 11px Inter;border:2px solid #fff;margin-left:-10px">+5</div>
    </div>
  </div>
</div>
</div></body></html>
