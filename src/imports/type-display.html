<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:240px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:14px">
  <div>
    <div style="font:600 40px/1 Inter, sans-serif;letter-spacing:-0.02em">Govern with confidence.</div>
    <div class="lbl" style="margin-top:4px">Hero · 40 / 700 / -0.02em</div>
  </div>
  <div>
    <div style="font:600 26px/1.2 Inter, sans-serif;letter-spacing:-0.01em">Risk assessment dashboard</div>
    <div class="lbl" style="margin-top:4px">Page H1 · 26 / 600 / -0.01em</div>
  </div>
  <div>
    <div style="font:600 22px/1.3 Inter, sans-serif;letter-spacing:-0.01em">Recent activity</div>
    <div class="lbl" style="margin-top:4px">H2 · 22 / 600</div>
  </div>
</div></div></body></html>
