<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:280px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;flex-direction:column;gap:20px">
  <div>
    <div class="lbl" style="margin-bottom:8px">Breadcrumbs</div>
    <div style="display:flex;align-items:center;gap:8px;font:400 13px Inter">
      <a style="color:#71717a;text-decoration:none">Dashboards</a>
      <span style="color:#a1a1aa">/</span>
      <a style="color:#71717a;text-decoration:none">Compliance</a>
      <span style="color:#a1a1aa">/</span>
      <span style="color:#18181b;font-weight:500">NCA ECC</span>
    </div>
  </div>
  <div>
    <div class="lbl" style="margin-bottom:8px">Tabs · underline</div>
    <div style="display:flex;gap:0;border-bottom:1px solid #e4e4e7">
      
        <div style="padding:10px 14px;font:500 13px Inter;color:#18181b;border-bottom:2px solid #3b82f6;margin-bottom:-1px;cursor:pointer">Overview</div>
      
        <div style="padding:10px 14px;font:500 13px Inter;color:#71717a;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Evidence</div>
      
        <div style="padding:10px 14px;font:500 13px Inter;color:#71717a;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Tasks</div>
      
        <div style="padding:10px 14px;font:500 13px Inter;color:#71717a;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Risks</div>
      
        <div style="padding:10px 14px;font:500 13px Inter;color:#71717a;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer">Audit history</div>
      
    </div>
  </div>
  <div>
    <div class="lbl" style="margin-bottom:8px">Pill tabs · segmented</div>
    <div style="display:inline-flex;gap:2px;background:#f4f4f5;padding:3px;border-radius:8px">
      
        <div style="padding:6px 14px;font:500 12px Inter;color:#71717a;background:transparent;border-radius:6px;cursor:pointer">Day</div>
      
        <div style="padding:6px 14px;font:500 12px Inter;color:#18181b;background:#fff;border-radius:6px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);cursor:pointer">Week</div>
      
        <div style="padding:6px 14px;font:500 12px Inter;color:#71717a;background:transparent;border-radius:6px;cursor:pointer">Month</div>
      
        <div style="padding:6px 14px;font:500 12px Inter;color:#71717a;background:transparent;border-radius:6px;cursor:pointer">Quarter</div>
      
    </div>
  </div>
</div>
</div></body></html>
