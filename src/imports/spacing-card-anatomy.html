<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:240px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  
</style></head>
<body><div class="card">
<div style="display:flex;gap:20px;align-items:flex-start">
  <div style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);width:280px">
    <div style="display:flex;align-items:center;min-height:52px;padding:14px 20px;gap:10px">
      <div style="font-size:15px;font-weight:600">Card title</div>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        <button style="height:28px;padding:0 10px;border-radius:6px;border:1px solid #e4e4e7;background:#fff;font:500 12px Inter;color:#3f3f46;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);cursor:pointer">Filter</button>
      </div>
    </div>
    <div style="padding:20px;border-top:1px solid #e4e4e7">
      <div style="font-size:13px;color:#52525b;line-height:1.5">Body content lives in <span class="val">p-5</span>. Borders separate header and footer.</div>
    </div>
    <div style="display:flex;align-items:center;padding:12px 20px;border-top:1px solid #e4e4e7;color:#71717a;font-size:12px">Footer · px-5 py-3</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="lbl">Card anatomy</div>
    <div class="val">rounded-xl · border · shadow-xs</div>
    <div class="val">Header: min-h-52 · px-5 py-3.5</div>
    <div class="val">Body: p-5</div>
    <div class="val">Footer: px-5 py-3 · border-t</div>
    <div class="lbl" style="margin-top:6px">No hover lift, no shadow-on-scroll.</div>
  </div>
</div>
</div></body></html>
