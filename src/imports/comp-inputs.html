<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:240px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  /* btn base */
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:Inter;font-weight:500;font-size:13px;border-radius:6px;border:1px solid transparent;cursor:pointer;height:34px;padding:0 12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);transition:background .15s;}
  .btn-primary{background:#3b82f6;color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-mono{background:#09090b;color:#fff;}
  .btn-destructive{background:#ef4444;color:#fff;}
  .btn-secondary{background:#f4f4f5;color:#18181b;}
  .btn-outline{background:#fff;color:#18181b;border:1px solid #e4e4e7;}
  .btn-outline:hover{background:#f4f4f5;}
  .btn-dashed{background:#fff;color:#18181b;border:1px dashed #d4d4d8;}
  .btn-ghost{background:transparent;color:#18181b;box-shadow:none;}
  .btn-ghost:hover{background:#f4f4f5;}
  .btn-dim{background:transparent;color:#71717a;box-shadow:none;}
  .btn-dim:hover{color:#18181b;}
  .btn-link{background:transparent;color:#3b82f6;box-shadow:none;padding:0;height:auto;border-radius:0;text-decoration:none;}
  .btn-link:hover{text-decoration:underline;}
  .btn-lg{height:40px;padding:0 16px;font-size:14px;}
  .btn-sm{height:28px;padding:0 10px;font-size:12px;}
  .btn-icon{width:34px;height:34px;padding:0;justify-content:center;}
  
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font:500 13px Inter">Email <span style="color:#71717a;font-weight:400">(default)</span></label>
      <input value="ahmed@cisohub.app" style="width:280px;height:34px;padding:0 12px;border:1px solid #e4e4e7;border-radius:6px;font:400 13px Inter;background:#fff;box-shadow:0 1px 2px 0 rgba(0,0,0,.05)">
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font:500 13px Inter">Search</label>
      <div style="position:relative;width:200px">
        <svg style="position:absolute;left:10px;top:9px" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search" style="width:100%;height:34px;padding:0 12px 0 32px;border:1px solid #e4e4e7;border-radius:6px;font:400 13px Inter;background:#fff;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);box-sizing:border-box">
      </div>
    </div>
  </div>
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font:500 13px Inter">Focus state</label>
      <input value="focused" style="width:200px;height:34px;padding:0 12px;border:1px solid #3b82f6;border-radius:6px;font:400 13px Inter;background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.18);outline:none">
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font:500 13px Inter;color:#ef4444">Error</label>
      <input value="invalid@" style="width:200px;height:34px;padding:0 12px;border:1px solid rgba(239,68,68,.6);border-radius:6px;font:400 13px Inter;background:#fff;box-shadow:0 0 0 3px rgba(239,68,68,.1)">
      <div style="font:500 11px Inter;color:#ef4444">Enter a valid email</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font:500 13px Inter">Disabled</label>
      <input value="—" disabled style="width:160px;height:34px;padding:0 12px;border:1px solid #e4e4e7;border-radius:6px;font:400 13px Inter;background:#f4f4f5cc;opacity:.6;cursor:not-allowed">
    </div>
  </div>
</div>
</div></body></html>
