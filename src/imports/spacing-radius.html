<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:200px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  
</style></head>
<body><div class="card">
<div class="row" style="gap:20px;align-items:flex-end">
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:0"></div>
      <div style="font-size:12px;font-weight:500">none</div>
      <div class="val">0</div>
      <div class="lbl" style="text-align:center;max-width:80px">table cells inside DataGrid</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:4px"></div>
      <div style="font-size:12px;font-weight:500">sm</div>
      <div class="val">4px</div>
      <div class="lbl" style="text-align:center;max-width:80px">small chips</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:6px"></div>
      <div style="font-size:12px;font-weight:500">md</div>
      <div class="val">6px</div>
      <div class="lbl" style="text-align:center;max-width:80px">inputs / buttons</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:8px"></div>
      <div style="font-size:12px;font-weight:500">lg</div>
      <div class="val">8px</div>
      <div class="lbl" style="text-align:center;max-width:80px">DEFAULT — sheets, popovers</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:12px"></div>
      <div style="font-size:12px;font-weight:500">xl</div>
      <div class="val">12px</div>
      <div class="lbl" style="text-align:center;max-width:80px">cards (largest)</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <div style="width:80px;height:60px;background:#3b82f6;border-radius:999"></div>
      <div style="font-size:12px;font-weight:500">full</div>
      <div class="val">999</div>
      <div class="lbl" style="text-align:center;max-width:80px">avatars, pills</div>
    </div>
</div></div></body></html>
