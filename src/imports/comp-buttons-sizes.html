<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:140px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  /* btn base */
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:Inter;font-weight:500;font-size:13px;border-radius:6px;border:1px solid transparent;cursor:pointer;height:34px;padding:0 12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);transition:background .15s;}
  .btn-primary{background:#3b82f6;color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-mono{background:#09090b;color:#fff;}
  .btn-destructive{background:#ef4444;color:#fff;}
  .btn-secondary{background:#f4f4f5;color:#18181b;}
  .btn-outline{background:#fff;color:#18181b;border:1px solid #e4e4e7;}
  .btn-outline:hover{background:#f4f4f5;}
  .btn-dashed{background:#fff;color:#18181b;border:1px dashed #d4d4d8;}
  .btn-ghost{background:transparent;color:#18181b;box-shadow:none;}
  .btn-ghost:hover{background:#f4f4f5;}
  .btn-dim{background:transparent;color:#71717a;box-shadow:none;}
  .btn-dim:hover{color:#18181b;}
  .btn-link{background:transparent;color:#3b82f6;box-shadow:none;padding:0;height:auto;border-radius:0;text-decoration:none;}
  .btn-link:hover{text-decoration:underline;}
  .btn-lg{height:40px;padding:0 16px;font-size:14px;}
  .btn-sm{height:28px;padding:0 10px;font-size:12px;}
  .btn-icon{width:34px;height:34px;padding:0;justify-content:center;}
  
</style></head>
<body><div class="card">
<div class="row" style="align-items:flex-end">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <button class="btn btn-primary btn-lg">Large</button>
    <div class="lbl">lg · h-40 · 14px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <button class="btn btn-primary">Medium</button>
    <div class="lbl">md · h-34 · 13px (default)</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <button class="btn btn-primary btn-sm">Small</button>
    <div class="lbl">sm · h-28 · 12px</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <button class="btn btn-outline btn-icon" aria-label="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <div class="lbl">icon · 34×34</div>
  </div>
</div>
</div></body></html>
