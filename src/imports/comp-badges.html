<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:280px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  /* btn base */
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:Inter;font-weight:500;font-size:13px;border-radius:6px;border:1px solid transparent;cursor:pointer;height:34px;padding:0 12px;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);transition:background .15s;}
  .btn-primary{background:#3b82f6;color:#fff;}
  .btn-primary:hover{background:#2563eb;}
  .btn-mono{background:#09090b;color:#fff;}
  .btn-destructive{background:#ef4444;color:#fff;}
  .btn-secondary{background:#f4f4f5;color:#18181b;}
  .btn-outline{background:#fff;color:#18181b;border:1px solid #e4e4e7;}
  .btn-outline:hover{background:#f4f4f5;}
  .btn-dashed{background:#fff;color:#18181b;border:1px dashed #d4d4d8;}
  .btn-ghost{background:transparent;color:#18181b;box-shadow:none;}
  .btn-ghost:hover{background:#f4f4f5;}
  .btn-dim{background:transparent;color:#71717a;box-shadow:none;}
  .btn-dim:hover{color:#18181b;}
  .btn-link{background:transparent;color:#3b82f6;box-shadow:none;padding:0;height:auto;border-radius:0;text-decoration:none;}
  .btn-link:hover{text-decoration:underline;}
  .btn-lg{height:40px;padding:0 16px;font-size:14px;}
  .btn-sm{height:28px;padding:0 10px;font-size:12px;}
  .btn-icon{width:34px;height:34px;padding:0;justify-content:center;}
  
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:12px">
  <div>
    <div class="lbl" style="margin-bottom:8px">Solid</div>
    <div class="row">
      <span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#3b82f6;color:#fff;font:500 12px Inter">primary</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#ef4444;color:#fff;font:500 12px Inter">destructive</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#22c55e;color:#fff;font:500 12px Inter">success</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#8b5cf6;color:#fff;font:500 12px Inter">info</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#f59e0b;color:#fff;font:500 12px Inter">warning</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#09090b;color:#fff;font:500 12px Inter">mono</span>
    </div>
  </div>
  <div>
    <div class="lbl" style="margin-bottom:8px">Light · used in DataGrid cells</div>
    <div class="row">
      <span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#22c55e1a;color:#15803d;font:500 12px Inter">Active</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#f59e0b1a;color:#b45309;font:500 12px Inter">Pending</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#ef44441a;color:#b91c1c;font:500 12px Inter">Expired</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#8b5cf61a;color:#6d28d9;font:500 12px Inter">Info</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#3b82f61a;color:#1d4ed8;font:500 12px Inter">Draft</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;background:#a1a1aa1a;color:#52525b;font:500 12px Inter">N/A</span>
    </div>
  </div>
  <div>
    <div class="lbl" style="margin-bottom:8px">Outline</div>
    <div class="row">
      <span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;border:1px solid #3b82f6;color:#3b82f6;font:500 12px Inter">Primary</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;border:1px solid #22c55e;color:#22c55e;font:500 12px Inter">Success</span><span style="display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:6px;border:1px solid #ef4444;color:#ef4444;font:500 12px Inter">Destructive</span>
    </div>
  </div>
  <div>
    <div class="lbl" style="margin-bottom:8px">BadgeDot · used in compact lists</div>
    <div class="row" style="gap:18px">
      <span style="display:inline-flex;align-items:center;gap:6px;font:500 12px Inter"><span style="width:6px;height:6px;border-radius:50%;background:#22c55e"></span>In Office</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font:500 12px Inter"><span style="width:6px;height:6px;border-radius:50%;background:#f59e0b"></span>Away</span>
      <span style="display:inline-flex;align-items:center;gap:6px;font:500 12px Inter"><span style="width:6px;height:6px;border-radius:50%;background:#ef4444"></span>On Leave</span>
    </div>
  </div>
</div>
</div></body></html>
