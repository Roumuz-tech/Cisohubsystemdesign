<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:140px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;gap:24px;align-items:stretch">
  <div style="flex:1;background:#fff;border:1px solid #e4e4e7;border-radius:10px;padding:24px;display:flex;align-items:center;justify-content:center">
    <img src="../assets/logos/cisohub-light.svg" alt="" style="height:36px">
  </div>
  <div style="flex:1;background:#0a0a0d;border-radius:10px;padding:24px;display:flex;align-items:center;justify-content:center">
    <img src="../assets/logos/cisohub-dark.svg" alt="" style="height:36px">
  </div>
  <div style="background:#fff;border:1px solid #e4e4e7;border-radius:10px;padding:24px;display:flex;align-items:center;justify-content:center;width:96px">
    <img src="../assets/logos/cisohub-mark.svg" alt="" style="height:36px">
  </div>
</div>
<div class="lbl" style="margin-top:12px">Wordmark · light + dark · mark-only · use <span class="val">cisohub-mark.svg</span> in collapsed sidebars / favicons</div>
</div></body></html>
