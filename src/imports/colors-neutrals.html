<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:180px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .col{display:flex;flex-direction:column;gap:8px;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .sw{width:80px;height:56px;border-radius:8px;border:1px solid var(--color-border);box-shadow:var(--shadow-xs);}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-foreground);font-family:var(--font-mono);}
  .nm{font-size:12px;color:var(--color-foreground);font-weight:500;}
  
</style>
</head>
<body>
<div class="card">

<div class="row" style="gap:6px;align-items:flex-end">
  
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#fafafa;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">50</div>
      <div class="val" style="font-size:10px">#fafafa</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#f4f4f5;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">100</div>
      <div class="val" style="font-size:10px">#f4f4f5</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#e4e4e7;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">200</div>
      <div class="val" style="font-size:10px">#e4e4e7</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#d4d4d8;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">300</div>
      <div class="val" style="font-size:10px">#d4d4d8</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#a1a1aa;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">400</div>
      <div class="val" style="font-size:10px">#a1a1aa</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#71717a;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">500</div>
      <div class="val" style="font-size:10px">#71717a</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#52525b;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">600</div>
      <div class="val" style="font-size:10px">#52525b</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#3f3f46;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">700</div>
      <div class="val" style="font-size:10px">#3f3f46</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#27272a;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">800</div>
      <div class="val" style="font-size:10px">#27272a</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#18181b;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">900</div>
      <div class="val" style="font-size:10px">#18181b</div>
    </div>
    <div class="swatch" style="align-items:center;gap:4px">
      <div style="width:54px;height:72px;background:#09090b;border-radius:6px;border:1px solid var(--color-border)"></div>
      <div class="nm">950</div>
      <div class="val" style="font-size:10px">#09090b</div>
    </div>
</div>
<div class="lbl" style="margin-top:14px">Zinc — neutral scale (Tailwind v4 base). Used for surface, border, text, muted backgrounds.</div>

</div>
</body>
</html>
