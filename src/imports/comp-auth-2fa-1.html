<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:560px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

<div style="background:var(--color-muted);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:460px">
  <div style="background:var(--color-card);border:1px solid var(--color-border);border-radius:12px;box-shadow:var(--shadow-xs);max-width:370px;width:100%">
    <div style="padding:40px">
      <div style="text-align:center;margin-bottom:22px">
        <div style="font:600 20px Inter;letter-spacing:-.01em">Two-factor verification</div>
        <div style="font:400 14px Inter;color:var(--color-muted-foreground);margin-top:6px">Enter the 6-digit code sent to your authenticator app.</div>
      </div>

      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
        
          <input type="text" value="8" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-primary);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:0 0 0 3px color-mix(in srgb, var(--color-primary) 18%, transparent);outline:none">
        
          <input type="text" value="3" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-primary);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:0 0 0 3px color-mix(in srgb, var(--color-primary) 18%, transparent);outline:none">
        
          <input type="text" value="9" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-primary);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:0 0 0 3px color-mix(in srgb, var(--color-primary) 18%, transparent);outline:none">
        
          <input type="text" value="" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-border);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        
          <input type="text" value="" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-border);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        
          <input type="text" value="" maxlength="1" style="width:40px;height:40px;padding:0;text-align:center;font:600 18px Inter;border:1px solid var(--color-border);border-radius:6px;background:var(--color-background);color:var(--color-foreground);box-shadow:var(--shadow-xs);outline:none">
        
      </div>

      <button style="width:100%;height:34px;background:var(--color-primary);color:var(--color-primary-foreground);border:1px solid transparent;border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer;margin-bottom:12px">Verify</button>

      <div style="text-align:center;font:400 13px Inter;color:var(--color-muted-foreground);margin-bottom:10px">
        Resend in <strong style="color:var(--color-foreground);font-weight:500">00:42</strong> · <a style="color:var(--color-primary);text-decoration:none;cursor:pointer;opacity:.5">Resend</a>
      </div>

      <a style="display:inline-flex;align-items:center;gap:6px;font:400 13px Inter;color:var(--color-muted-foreground);text-decoration:none;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Login
      </a>
    </div>
  </div>
</div>
