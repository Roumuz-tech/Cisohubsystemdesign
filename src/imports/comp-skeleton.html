<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:220px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style></head><body><div class="card">
<div style="background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:20px">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div style="height:12px;width:60%;border-radius:4px;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
      <div style="height:10px;width:40%;border-radius:4px;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
    </div>
  </div>
  <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
    <div style="height:12px;width:100%;border-radius:4px;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
    <div style="height:12px;width:90%;border-radius:4px;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
    <div style="height:12px;width:70%;border-radius:4px;background:linear-gradient(90deg,#f4f4f5,#e4e4e7,#f4f4f5);background-size:200% 100%;animation:shimmer 1.4s linear infinite"></div>
  </div>
</div>
<div class="lbl" style="margin-top:10px">Skeleton (RL-15) — never a centered spinner. 1.4s loop, ≤300ms (RL-16) for state transitions.</div>
</div></body></html>
