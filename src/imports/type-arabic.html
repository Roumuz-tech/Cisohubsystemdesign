<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:240px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:14px" dir="rtl">
  <div>
    <div style="font:600 26px/1.3 Cairo, Inter;letter-spacing:-0.01em">لوحة تحكم المخاطر</div>
    <div class="lbl" dir="ltr" style="margin-top:4px">Page H1 · Cairo 26 / 600</div>
  </div>
  <div>
    <div style="font:400 14px/1.7 Cairo, Inter">إطار العمل الامتثالي للأنشطة السيبرانية للجهات الوطنية. التحديث الأخير قبل 12 دقيقة.</div>
    <div class="lbl" dir="ltr" style="margin-top:4px">Body · Cairo 14 / 400, line-height 1.7 (Arabic needs extra)</div>
  </div>
  <div>
    <div style="font:500 13px/1.5 Cairo, Inter;background:rgba(59,130,246,.1);color:#1d4ed8;padding:4px 10px;border-radius:6px;display:inline-block">قيد المراجعة</div>
    <div class="lbl" dir="ltr" style="margin-top:6px">Badge · Cairo 13 / 500 (in light primary badge)</div>
  </div>
</div></div></body></html>
