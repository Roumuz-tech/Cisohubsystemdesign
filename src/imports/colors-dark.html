<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;width:700px;min-height:180px;box-sizing:border-box;}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;}
.swatch{display:flex;flex-direction:column;gap:6px;}
.sw{width:80px;height:56px;border-radius:8px;border:1px solid var(--color-border);}
.nm{font-size:12px;font-weight:500;}
.val{font-size:11px;font-family:var(--font-mono);color:var(--color-muted-foreground);}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
</style></head>
<body><div class="card">
  <div class="row">
  <div class="swatch"><div class="sw" style="background:#0a0a0d"></div><div class="nm">bg</div><div class="val">#0a0a0d</div><div class="lbl">Page</div></div><div class="swatch"><div class="sw" style="background:#18181b"></div><div class="nm">card</div><div class="val">#18181b</div><div class="lbl">Card</div></div><div class="swatch"><div class="sw" style="background:#27272a"></div><div class="nm">muted</div><div class="val">#27272a</div><div class="lbl">Muted</div></div><div class="swatch"><div class="sw" style="background:rgba(255,255,255,.08)"></div><div class="nm">border</div><div class="val">rgba(255,255,255,.08)</div><div class="lbl">Border</div></div><div class="swatch"><div class="sw" style="background:#fafafa"></div><div class="nm">foreground</div><div class="val">#fafafa</div><div class="lbl">Text</div></div><div class="swatch"><div class="sw" style="background:#3b82f6"></div><div class="nm">primary</div><div class="val">#3b82f6</div><div class="lbl">Primary still blue-500</div></div>
  </div>
</div></body></html>
