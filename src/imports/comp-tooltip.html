<!doctype html>

<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:250px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

<div style="display:flex;gap:60px;align-items:flex-start">
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div style="position:relative;background:var(--color-zinc-950);color:var(--color-primary-foreground);font:500 12px Inter;padding:6px 12px;border-radius:6px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05),0 2px 4px -2px rgba(0,0,0,.05)">

    </div>
    <button style="height:34px;padding:0 12px;background:var(--color-background);color:var(--color-foreground);border:1px solid var(--color-border);border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer">Hover me</button>
    <div class="lbl">dark (default)</div>
    <div class="val">bg-zinc-950 · text-white</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div style="position:relative;background:var(--color-background);color:var(--color-foreground);font:500 12px Inter;padding:6px 12px;border:1px solid var(--color-border);border-radius:6px;box-shadow:0 4px 6px -1px rgba(0,0,0,.05),0 2px 4px -2px rgba(0,0,0,.05)">
      <strong>Layla Khan</strong> · last seen 1h ago
      <span style="position:absolute;top:100%;inset-inline-start:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--color-background);filter:drop-shadow(0 1px 0 var(--color-border))"></span>
    </div>
    <button style="height:34px;padding:0 12px;background:var(--color-background);color:var(--color-foreground);border:1px solid var(--color-border);border-radius:6px;font:500 13px Inter;box-shadow:var(--shadow-xs);cursor:pointer">Hover me</button>
    <div class="lbl">light</div>
    <div class="val">border · bg-background · text-foreground</div>
  </div>
</div>
