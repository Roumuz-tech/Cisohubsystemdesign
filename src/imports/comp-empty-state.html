<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:320px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;border:1px dashed #d4d4d8;border-radius:12px;background:#fafafa">
  <div style="width:56px;height:56px;border-radius:14px;background:#3b82f614;color:#3b82f6;display:flex;align-items:center;justify-content:center;margin-bottom:14px">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  </div>
  <div style="font:600 16px Inter">No frameworks linked yet</div>
  <div style="font:400 13px/1.5 Inter;color:#71717a;max-width:300px;margin-top:6px">Add a framework to this engagement to start tracking compliance against its controls.</div>
  <button style="margin-top:16px;height:34px;padding:0 14px;background:#3b82f6;color:#fff;border:1px solid transparent;border-radius:6px;font:500 13px Inter;cursor:pointer;box-shadow:0 1px 2px 0 rgba(0,0,0,.05);display:inline-flex;align-items:center;gap:6px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add framework
  </button>
</div>
</div></body></html>
