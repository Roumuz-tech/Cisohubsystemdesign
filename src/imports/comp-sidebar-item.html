<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
.card{padding:20px;box-sizing:border-box;width:700px;min-height:280px;}
.lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
.val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}

</style></head><body><div class="card">
<div style="display:flex;gap:20px;align-items:flex-start">
  <div style="background:#2a3042;width:240px;border-radius:8px;padding:14px 10px;display:flex;flex-direction:column;gap:2px">
    <div style="padding:6px 12px;color:rgba(255,255,255,.4);font:500 10px Inter;letter-spacing:.1em;text-transform:uppercase">Dashboard</div>
    
      <a style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font:500 13px Inter;text-decoration:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
        <span style="flex:1">Frameworks</span>
        <span style="background:#ef4444;color:#fff;font:600 10px Inter;padding:2px 6px;border-radius:10px">12</span>
      </a>
    
      <a style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:transparent;color:rgba(255,255,255,.7);font:500 13px Inter;text-decoration:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span style="flex:1">Policies</span>
        
      </a>
    
      <a style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:transparent;color:rgba(255,255,255,.7);font:500 13px Inter;text-decoration:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        <span style="flex:1">Risks</span>
        <span style="background:#ef4444;color:#fff;font:600 10px Inter;padding:2px 6px;border-radius:10px">4</span>
      </a>
    
      <a style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:transparent;color:rgba(255,255,255,.7);font:500 13px Inter;text-decoration:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>
        <span style="flex:1">Evidence</span>
        
      </a>
    
      <a style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:transparent;color:rgba(255,255,255,.7);font:500 13px Inter;text-decoration:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span style="flex:1">Team</span>
        
      </a>
    
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;flex:1">
    <div class="lbl">Sidebar item (Comply · dark)</div>
    <div class="val">bg #2a3042 · w-280 (collapsed 80)</div>
    <div class="val">Item: gap-10 · px-12 py-8 · radius-6</div>
    <div class="val">Active: bg-white/10 · text-white</div>
    <div class="val">Hover: bg-white/05</div>
    <div class="lbl" style="margin-top:6px">RL-12: z-index ≤ 20 for sidebar.</div>
  </div>
</div>
</div></body></html>
