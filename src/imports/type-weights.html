<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--color-background);color:var(--color-foreground);font-family:var(--font-sans);}
  .card{padding:20px;box-sizing:border-box;width:700px;min-height:210px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .lbl{font-size:11px;color:var(--color-muted-foreground);font-weight:500;}
  .val{font-size:11px;color:var(--color-muted-foreground);font-family:var(--font-mono);}
  
</style></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:6px">
  
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="lbl" style="width:96px">300 · Light</div>
      <div style="font:300 18px/1.3 Inter">Identity & control assurance</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="lbl" style="width:96px">400 · Regular</div>
      <div style="font:400 18px/1.3 Inter">Identity & control assurance</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="lbl" style="width:96px">500 · Medium</div>
      <div style="font:500 18px/1.3 Inter">Identity & control assurance</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="lbl" style="width:96px">600 · SemiBold</div>
      <div style="font:600 18px/1.3 Inter">Identity & control assurance</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <div class="lbl" style="width:96px">700 · Bold</div>
      <div style="font:700 18px/1.3 Inter">Identity & control assurance</div>
    </div>
</div></div></body></html>
